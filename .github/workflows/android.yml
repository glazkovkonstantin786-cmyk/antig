name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Fix Line Endings and Run Build
        run: |
          # Фикс для Windows-окончаний строк (CRLF -> LF)
          sed -i 's/\r$//' build.sh
          chmod +x build.sh
          ./build.sh

      - name: Build Final APK
        run: |
          cd android
          # Фикс для gradlew (тоже может быть с CRLF)
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: antigravity-mobile-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
